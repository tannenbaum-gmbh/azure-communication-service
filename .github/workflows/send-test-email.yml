name: Send Test Email

# Sends a test email using Azure Communication Service.
# Authenticates with Azure using OIDC – no long-lived secrets required.
#
# Prerequisites (GitHub repository secrets):
#   AZURE_CLIENT_ID       – Application (client) ID of the Entra ID app registration.
#   AZURE_TENANT_ID       – Azure AD / Entra ID tenant ID.
#   AZURE_SUBSCRIPTION_ID – Target Azure subscription ID.
#
# The Azure Communication Service must already be deployed (run the deploy workflow first).
# The sender address must use the Azure Managed Domain:
#   DoNotReply@<emailServiceName>.azurecomm.net

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Azure Resource Group containing the Communication Service'
        required: true
        type: string
        default: 'rg-acs-playground'
      communication_service_name:
        description: 'Azure Communication Service name (leave blank for deterministic, subscription-scoped default)'
        required: false
        type: string
        default: ''
      sender_address:
        description: 'Sender email address (leave blank for DoNotReply@<derived-email-service>.azurecomm.net)'
        required: false
        type: string
        default: ''
      recipient_email:
        description: 'Recipient email address for the test email'
        required: true
        type: string
      subject:
        description: 'Email subject line'
        required: false
        type: string
        default: 'Test Email from Azure Communication Service'

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read    # Required to checkout the repository

jobs:
  send-email:
    name: Send Test Email
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Communication CLI extension
        run: az extension add --name communication --yes

      - name: Resolve effective service and sender values
        id: resolve_defaults
        run: |
          set -euo pipefail

          to_letter() {
            # Maps 0-25 to a-z (callers pass values reduced with modulo 26).
            printf "\\$(printf '%03o' "$((97 + $1))")"
          }

          SUBSCRIPTION_ID=$(az account show --query id --output tsv)
          SUBSCRIPTION_HASH=$(printf '%s' "$SUBSCRIPTION_ID" | sha256sum | awk '{print $1}')
          NAME_SUFFIX="$(
            to_letter "$((16#${SUBSCRIPTION_HASH:0:2} % 26))"
            to_letter "$((16#${SUBSCRIPTION_HASH:2:2} % 26))"
            to_letter "$((16#${SUBSCRIPTION_HASH:4:2} % 26))"
            to_letter "$((16#${SUBSCRIPTION_HASH:6:2} % 26))"
            to_letter "$((16#${SUBSCRIPTION_HASH:8:2} % 26))"
            to_letter "$((16#${SUBSCRIPTION_HASH:10:2} % 26))"
          )"

          DEFAULT_COMMUNICATION_SERVICE_NAME="acs-playground-${NAME_SUFFIX}"
          DEFAULT_EMAIL_SERVICE_NAME="ecs-playground-${NAME_SUFFIX}"

          COMMUNICATION_SERVICE_NAME="${{ inputs.communication_service_name }}"
          if [ -z "$COMMUNICATION_SERVICE_NAME" ]; then
            COMMUNICATION_SERVICE_NAME="$DEFAULT_COMMUNICATION_SERVICE_NAME"
          fi

          SENDER_ADDRESS="${{ inputs.sender_address }}"
          if [ -z "$SENDER_ADDRESS" ]; then
            SENDER_ADDRESS="DoNotReply@${DEFAULT_EMAIL_SERVICE_NAME}.azurecomm.net"
          fi

          echo "communication_service_name=$COMMUNICATION_SERVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "sender_address=$SENDER_ADDRESS" >> "$GITHUB_OUTPUT"

      - name: Retrieve ACS connection string
        id: get_connection_string
        run: |
          CONNECTION_STRING=$(az communication list-key \
            --name "${{ steps.resolve_defaults.outputs.communication_service_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --query primaryConnectionString \
            --output tsv)

          if [ -z "$CONNECTION_STRING" ]; then
            echo "::error::Could not retrieve connection string. Make sure the Communication Service exists and you have the required permissions."
            exit 1
          fi

          # Mask the connection string so it never appears in plain text in logs
          echo "::add-mask::$CONNECTION_STRING"
          echo "connection_string=$CONNECTION_STRING" >> "$GITHUB_OUTPUT"

      - name: Send test email
        env:
          CONNECTION_STRING: ${{ steps.get_connection_string.outputs.connection_string }}
          EMAIL_BODY: |
            Hello,

            This is a test email sent from Azure Communication Service.

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Triggered by: ${{ github.actor }}
            Timestamp: __TIMESTAMP__

            If you received this message, the Azure Communication Service email feature is working correctly.

            Regards,
            Azure Communication Service Playground
        run: |
          BODY="${EMAIL_BODY//__TIMESTAMP__/$(date -u '+%Y-%m-%d %H:%M:%S UTC')}"
          az communication email send \
            --connection-string "$CONNECTION_STRING" \
            --sender "${{ steps.resolve_defaults.outputs.sender_address }}" \
            --to "${{ inputs.recipient_email }}" \
            --subject "${{ inputs.subject }}" \
            --text "$BODY"

      - name: Report result
        run: |
          echo "### Test Email Sent ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **From** | ${{ steps.resolve_defaults.outputs.sender_address }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **To** | ${{ inputs.recipient_email }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Subject** | ${{ inputs.subject }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | ${{ steps.resolve_defaults.outputs.communication_service_name }} |" >> "$GITHUB_STEP_SUMMARY"
